name: Daily Stock Scan

on:
  schedule:
    # 台北時間 19:55 = UTC 11:55
    - cron: '55 11 * * *'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 💡 新增：快取機制，賦予機器人「長期記憶」
      - name: Cache Stock Data
        uses: actions/cache@v3
        with:
          # 指向 scanner.py 裡設定的緩存資料夾
          path: ./data/cache
          # 使用 run_id 確保每次執行都會存成新的快取
          key: stock-cache-${{ runner.os }}-${{ github.run_id }}
          # 關鍵：優先找回「最新一次」成功的快取
          restore-keys: |
            stock-cache-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pip install yfinance pandas openpyxl requests urllib3 tqdm xlsxwriter

      - name: Run Scanner
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
          FM_TOKEN: ${{ secrets.FM_TOKEN }}
        run: python scanner.py
