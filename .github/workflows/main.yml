name: Daily Stock Scan

on:
  schedule:
    - cron: '55 11 * * *' # 這是 UTC 時間，等於台北時間 19:55
  workflow_dispatch:      # 讓你可以手動按按鈕測試

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas openpyxl requests urllib3 tqdm xlsxwriter

      - name: Run Scanner
        env:
          G_TOKEN: ${{ secrets.G_TOKEN }}
          FM_TOKEN: ${{ secrets.FM_TOKEN }}
        run: python scanner.py
